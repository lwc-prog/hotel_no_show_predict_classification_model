preprocessing:
  db_path: ../data/noshow.db
  table_name: noshow
  usd_to_sgd_rate: 1.35
  date_year: 2024

data_split:
  test_size: 0.2
  random_state: 42
  stratify: true

encoder:
  handle_unknown: ignore

models:
  extra_trees:
    n_estimators: 300
    class_weight: balanced
    random_state: 42
    n_jobs: -1

  random_forest:
    n_estimators: 300
    class_weight: balanced
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 5
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: logloss
    random_state: 42

metrics:
  primary: roc_auc
  scoring:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
